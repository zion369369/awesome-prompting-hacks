# .github/workflows/star-updater.yml
name: Stargazers Wall Updater

on:
  schedule:
    # Run once daily at midnight UTC
    - cron: '0 0 * * *'
  watch:
    types: [started] # Triggers when someone stars the repository
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stargazers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Refresh Stargazers Wall
        run: node scripts/update-stargazers.js

      - name: Check for Changes
        id: git-check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "chore: refresh stargazers wall in README.md [skip ci]"
          git push origin main
