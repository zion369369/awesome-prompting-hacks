# .github/workflows/discussions-sync.yml
name: Discussions Sync

on:
  schedule:
    # Run once daily at 9:30 AM UTC
    - cron: '30 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  post-to-discussions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Publish Prompt of the Day to Discussions
        run: node scripts/post-to-discussion.js
